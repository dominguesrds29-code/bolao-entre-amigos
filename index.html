<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <meta name="theme-color" content="#111413"/>
    <title>Bolão Copa 2026</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="public/icons.svg">
    
    <!-- Tailwind CSS (CDN as requested) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ff87",
                        "secondary": "#ff7a00",
                        "background": "#080c14",
                        "surface": "#111625",
                        "surface-bright": "#1b2237",
                        "surface-container": "#151c2d",
                        "surface-container-low": "#0f1422",
                        "surface-container-high": "#1d273e",
                        "surface-container-highest": "#25324e",
                        "on-surface": "#f8fafc",
                        "on-surface-variant": "#94a3b8",
                        "outline": "#334155",
                        "outline-variant": "#1e293b",
                        "tertiary": "#f59e0b",
                        "tertiary-container": "#d97706"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "gutter": "16px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "base": "4px",
                        "container-max": "1200px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Anybody"],
                        "label-md": ["JetBrains Mono"],
                        "label-sm": ["JetBrains Mono"],
                        "display-lg": ["Anybody"],
                        "headline-md": ["Anybody"],
                        "headline-lg": ["Anybody"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-body-md text-body-md stadium-gradient min-h-screen pb-24">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md shadow-sm border-b border-white/10 flex justify-between items-center px-margin-mobile h-16">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-primary/20">
                <span class="material-symbols-outlined text-primary" style="font-size: 24px;">sports_soccer</span>
            </div>
            <h1 class="font-headline-md text-headline-md font-bold text-white tracking-tight uppercase">Bolão Copa</h1>
        </div>
        <div class="flex items-center gap-2 bg-surface-bright px-3 py-1.5 rounded-full border border-white/10 shadow-[0_0_10px_rgba(0,255,135,0.05)]">
            <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 20px;">account_balance_wallet</span>
            <span class="font-label-md text-label-md text-white">SALDO: <span class="text-primary font-bold" id="userPoints">1.250 PTS</span></span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="pt-24 px-margin-mobile max-w-container-max mx-auto space-y-8">
        <!-- Content will be injected here by app.js -->
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-safe pt-2 bg-surface-container-low z-50 shadow-[0_-4px_12px_rgba(0,0,0,0.5)] border-t border-white/5 safe-area-padding">
        <button class="nav-btn active flex flex-col items-center justify-center px-4 py-1 transition-all duration-150 active:scale-95" data-target="home">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
            <span class="font-label-sm text-label-sm mt-0.5">Início</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-bright/10 px-4 py-1 rounded-full transition-all duration-150 active:scale-95" data-target="palpites">
            <span class="material-symbols-outlined">sports_soccer</span>
            <span class="font-label-sm text-label-sm mt-0.5">Palpites</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-bright/10 px-4 py-1 rounded-full transition-all duration-150 active:scale-95" data-target="ranking">
            <span class="material-symbols-outlined">leaderboard</span>
            <span class="font-label-sm text-label-sm mt-0.5">Ranking</span>
        </button>
        <button class="nav-btn flex flex-col items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-bright/10 px-4 py-1 rounded-full transition-all duration-150 active:scale-95" data-target="regras">
            <span class="material-symbols-outlined">gavel</span>
            <span class="font-label-sm text-label-sm mt-0.5">Regras</span>
        </button>
    </nav>

    <!-- Templates -->
    <template id="tpl-home">
        <!-- Bet Dashboard Header Card -->
        <section class="relative overflow-hidden rounded-xl glass-card p-6 border-l-4 border-primary fade-in glow-neon">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <span class="material-symbols-outlined text-8xl text-primary" style="font-variation-settings: 'FILL' 1;">military_tech</span>
            </div>
            <div class="relative z-10 flex flex-col gap-4">
                <div>
                    <p class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-widest">OITAVAS DE FINAL • COPA 2026</p>
                    <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">emoji_events</span>
                        <span>4º Lugar Geral</span>
                    </h2>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-on-surface-variant font-label-sm text-label-sm">Retorno de Pontos</p>
                        <p class="font-display-lg text-display-lg text-primary font-bold">1.250 <span class="text-headline-md font-headline-md font-normal text-on-surface-variant">PTS</span></p>
                    </div>
                    <div class="bg-primary/10 border border-primary/20 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-primary text-sm font-bold">trending_up</span>
                        <span class="text-primary text-xs font-extrabold uppercase">+2 POSIÇÕES</span>
                    </div>
                </div>
                <!-- Progress Bar -->
                <div class="space-y-1">
                    <div class="flex justify-between text-[11px] font-label-sm text-on-surface-variant uppercase">
                        <span>Progresso dos Palpites</span>
                        <span>8 / 16 Concluídos</span>
                    </div>
                    <div class="w-full h-2.5 bg-surface-container rounded-full overflow-hidden border border-white/5">
                        <div class="h-full bg-gradient-to-r from-primary to-emerald-400 w-[50%] rounded-full shadow-[0_0_8px_rgba(0,255,135,0.4)]"></div>
                    </div>
                </div>
                
                <!-- User Streak/Form -->
                <div class="border-t border-white/5 pt-3 mt-1">
                    <p class="text-on-surface-variant text-[11px] font-label-sm uppercase mb-2">Sua Sequência (Últimos Jogos)</p>
                    <div class="flex gap-2">
                        <span class="form-dot win" title="Placar Exato (10 pts)">V</span>
                        <span class="form-dot win" title="Placar Exato (10 pts)">V</span>
                        <span class="form-dot draw" title="Vencedor + Saldo (7 pts)">E</span>
                        <span class="form-dot loss" title="Errou (0 pts)">D</span>
                        <span class="form-dot win" title="Placar Exato (10 pts)">V</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Featured Next Matches -->
        <section class="space-y-4 fade-in">
            <div class="flex justify-between items-center">
                <h3 class="font-headline-md text-headline-md text-white font-bold tracking-tight flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-primary inline-block"></span>
                    <span>Destaques da Rodada</span>
                </h3>
                <button class="text-primary font-label-md text-label-md hover:underline flex items-center gap-1 font-bold" onclick="navigateTo('palpites')">
                    VER TODOS <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Quick Bet Featured Card -->
                <div class="glass-card rounded-xl p-5 border border-white/5 transition-all duration-200 hover:border-primary/20">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                            <span class="text-on-surface-variant font-label-sm text-xs uppercase font-semibold">Sáb, 16:00 • MetLife Stadium</span>
                        </div>
                        <span class="bg-secondary/15 text-secondary border border-secondary/35 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">Multiplicador x2.0</span>
                    </div>
                    
                    <div class="flex items-center justify-between gap-4 py-2">
                        <!-- Home Team -->
                        <div class="flex flex-col items-center gap-2 flex-1">
                            <div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center border border-white/10 text-2xl shadow-inner">🇧🇷</div>
                            <span class="font-bold text-center leading-tight text-white uppercase text-xs tracking-wider">Brasil</span>
                        </div>
                        
                        <!-- Center Inputs & Versus -->
                        <div class="flex items-center gap-2">
                            <input type="number" id="quick-home-1" class="w-12 h-14 bg-surface-container-high border border-outline/30 rounded-lg text-center font-bold text-2xl text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="-">
                            <span class="text-on-surface-variant font-bold text-lg">x</span>
                            <input type="number" id="quick-away-1" class="w-12 h-14 bg-surface-container-high border border-outline/30 rounded-lg text-center font-bold text-2xl text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="-">
                        </div>
                        
                        <!-- Away Team -->
                        <div class="flex flex-col items-center gap-2 flex-1">
                            <div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center border border-white/10 text-2xl shadow-inner">🇫🇷</div>
                            <span class="font-bold text-center leading-tight text-white uppercase text-xs tracking-wider">França</span>
                        </div>
                    </div>
                    
                    <!-- Interactive Quick selection 1X2 -->
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <button class="odds-btn py-2.5 rounded-lg font-bold text-xs uppercase" onclick="selectQuickWinner(1, 'home')">CASA</button>
                        <button class="odds-btn py-2.5 rounded-lg font-bold text-xs uppercase" onclick="selectQuickWinner(1, 'draw')">EMPATE</button>
                        <button class="odds-btn py-2.5 rounded-lg font-bold text-xs uppercase" onclick="selectQuickWinner(1, 'away')">FORA</button>
                    </div>
                    
                    <button class="w-full mt-4 bg-primary text-background font-extrabold py-3 rounded-lg active:scale-95 transition-transform uppercase tracking-wider text-xs shadow-md shadow-primary/10" onclick="saveQuickBet(1)">Adicionar ao Boletim</button>
                </div>
            </div>
        </section>

        <!-- Recent Wins -->
        <section class="space-y-4 fade-in pb-8">
            <h3 class="font-headline-md text-headline-md text-white font-bold tracking-tight flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-secondary inline-block"></span>
                <span>Seus Últimos Resultados</span>
            </h3>
            
            <div class="glass-card rounded-xl overflow-hidden border border-white/5">
                <div class="flex items-center justify-between p-4 border-b border-white/5 bg-surface-container">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">check_circle</span>
                        <span class="font-bold text-sm uppercase tracking-wider text-white">Placar Exato (Na Mosca!)</span>
                    </div>
                    <span class="font-label-md text-label-md text-primary font-bold">+10 PTS</span>
                </div>
                <div class="p-5 flex items-center justify-between">
                    <div class="flex flex-col gap-1.5">
                      <div class="flex items-center gap-3">
                            <span class="font-bold text-white text-sm uppercase">Espanha</span>
                            <span class="text-primary font-bold text-xl px-2 py-0.5 bg-primary/10 rounded">3 - 1</span>
                            <span class="font-bold text-white text-sm uppercase">Croácia</span>
                        </div>
                        <p class="text-on-surface-variant text-xs">Seu palpite: <span class="font-bold text-white">3 - 1</span></p>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-2xl">celebration</span>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-palpites">
        <div class="mb-6 fade-in">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white font-extrabold uppercase tracking-tight">Esportes: Oitavas</h2>
                    <p class="text-on-surface-variant font-body-md text-xs mt-1 uppercase tracking-wider">Copa do Mundo 2026</p>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-bold text-primary tracking-widest uppercase">Palpitados</span>
                    <span class="text-white font-extrabold text-lg mt-0.5" id="palpites-progress-text">2 / 8 JOGOS</span>
                    <div class="w-24 h-1.5 bg-surface-container rounded-full mt-1.5 overflow-hidden border border-white/5">
                        <div id="palpites-progress-bar" class="w-2/8 h-full bg-primary shadow-[0_0_8px_rgba(0,255,135,0.4)]"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-36 fade-in" id="matches-container">
            <!-- Inject matches via JS -->
        </div>
    </template>

    <template id="tpl-ranking">
        <div class="mb-8 mt-2 fade-in text-center">
            <span class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">COPA DO MUNDO 2026</span>
            <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white mt-2">Ranking Global</h2>
            <p class="text-on-surface-variant font-body-md mt-1 opacity-80">Acompanhe quem está no topo.</p>
        </div>

        <!-- Podium -->
        <div class="flex justify-center items-end gap-2 mb-8 fade-in">
            <!-- 2nd -->
            <div class="flex flex-col items-center">
                <div class="w-14 h-14 rounded-lg bg-surface border-2 border-outline-variant overflow-hidden mb-2">
                    <img src="https://i.pravatar.cc/150?img=1" class="w-full h-full object-cover">
                </div>
                <span class="font-label-sm text-xs bg-surface-variant px-2 rounded-full mb-1">2º</span>
                <span class="text-white font-bold text-sm">Mariana R.</span>
                <span class="text-secondary-fixed text-xs font-bold">2.450 pts</span>
                <div class="w-16 h-16 bg-surface-container-high rounded-t-lg mt-2"></div>
            </div>
            <!-- 1st -->
            <div class="flex flex-col items-center relative z-10">
                <span class="material-symbols-outlined text-tertiary absolute -top-6 text-3xl">workspace_premium</span>
                <div class="w-20 h-20 rounded-lg bg-surface border-2 border-tertiary overflow-hidden mb-2 shadow-[0_0_15px_rgba(233,196,0,0.3)]">
                    <img src="https://i.pravatar.cc/150?img=11" class="w-full h-full object-cover">
                </div>
                <span class="font-label-sm text-xs bg-tertiary text-on-tertiary px-2 rounded-full mb-1">1º</span>
                <span class="text-white font-bold">Thiago Lima</span>
                <span class="text-tertiary text-sm font-bold">2.850 pts</span>
                <div class="w-20 h-24 bg-surface-container-highest rounded-t-lg mt-2 border-t border-tertiary/30"></div>
            </div>
            <!-- 3rd -->
            <div class="flex flex-col items-center">
                <div class="w-14 h-14 rounded-lg bg-surface border-2 border-outline-variant overflow-hidden mb-2">
                    <img src="https://i.pravatar.cc/150?img=12" class="w-full h-full object-cover">
                </div>
                <span class="font-label-sm text-xs bg-surface-variant px-2 rounded-full mb-1">3º</span>
                <span class="text-white font-bold text-sm">Carlos M.</span>
                <span class="text-secondary-fixed text-xs font-bold">2.180 pts</span>
                <div class="w-16 h-12 bg-surface-container rounded-t-lg mt-2"></div>
            </div>
        </div>

        <!-- List -->
        <div class="glass-card rounded-xl overflow-hidden fade-in mb-8">
            <table class="w-full text-left">
                <thead class="bg-surface-container/50">
                    <tr class="text-on-surface-variant text-xs uppercase tracking-wider">
                        <th class="px-4 py-3">Pos</th>
                        <th class="px-4 py-3">Participante</th>
                        <th class="px-4 py-3 text-right">Pontos</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-white/5">
                        <td class="px-4 py-3 text-on-surface-variant">4º</td>
                        <td class="px-4 py-3 font-bold flex items-center gap-2">
                            <img src="https://i.pravatar.cc/150?img=5" class="w-6 h-6 rounded-full">
                            Beatriz Oliveira
                        </td>
                        <td class="px-4 py-3 text-right">1.950</td>
                    </tr>
                    <tr class="bg-primary-container/20 border-b border-primary/20">
                        <td class="px-4 py-3 font-bold text-primary">5º</td>
                        <td class="px-4 py-3 font-bold flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-sm">person</span>
                            Você (João)
                        </td>
                        <td class="px-4 py-3 text-right text-secondary-fixed font-bold">1.250</td>
                    </tr>
                    <tr>
                        <td class="px-4 py-3 text-on-surface-variant">6º</td>
                        <td class="px-4 py-3 font-bold flex items-center gap-2">
                            <img src="https://i.pravatar.cc/150?img=7" class="w-6 h-6 rounded-full">
                            Felipe Mendes
                        </td>
                        <td class="px-4 py-3 text-right">1.100</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </template>

    <template id="tpl-regras">
        <div class="mb-8 fade-in">
            <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary-fixed mb-2">Regras de Pontuação</h2>
            <p class="text-on-surface-variant font-body-md opacity-80">Estas regras são válidas para todos os confrontos da Copa do Mundo.</p>
        </div>
        
        <div class="grid grid-cols-1 gap-4 mb-10 fade-in">
            <div class="glass-card rounded-xl p-6 border-secondary-fixed/30 relative overflow-hidden group shadow-[0_0_15px_rgba(121,255,91,0.1)]">
                <div class="flex justify-between items-start mb-4">
                    <div class="bg-secondary-container text-on-secondary-container font-headline-md text-headline-md px-4 py-1 rounded-lg">10 pts</div>
                    <span class="material-symbols-outlined text-secondary-fixed">workspace_premium</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-white mb-2">Placar Exato</h3>
                <p class="text-on-surface-variant mb-6">A pontuação máxima! Você acertou precisamente o número de gols de ambas as seleções.</p>
            </div>
            
            <div class="glass-card rounded-xl p-6 border-white/10">
                <div class="flex justify-between items-center mb-4">
                    <div class="bg-primary-container text-primary font-headline-md text-headline-md px-3 py-1 rounded-lg">7 pts</div>
                    <span class="material-symbols-outlined text-primary-fixed-dim">sports_soccer</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-white mb-2">Vencedor + Saldo</h3>
                <p class="text-on-surface-variant text-sm">Acertou a seleção vencedora e a diferença de gols, mas errou o placar exato.</p>
            </div>
            
            <div class="glass-card rounded-xl p-5 border-white/5">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center font-bold text-tertiary">5</div>
                    <h4 class="font-headline-md text-headline-md text-white text-lg">Vencedor/Empate</h4>
                </div>
                <p class="text-on-surface-variant text-sm">Acertou quem ganhou ou se deu empate.</p>
            </div>
            
            <div class="glass-card rounded-xl p-5 border-white/5">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center font-bold text-primary-fixed-dim">2</div>
                    <h4 class="font-headline-md text-headline-md text-white text-lg">Gols de uma Seleção</h4>
                </div>
                <p class="text-on-surface-variant text-sm">Acertou apenas os gols de um dos lados.</p>
            </div>
        </div>
    </template>

    <!-- Boletim de Palpites (Bet Slip) -->
    <div id="bet-slip" class="bet-slip-drawer px-4 pt-4 pb-safe max-w-md mx-auto left-0 right-0 md:max-w-xl">
        <div class="flex justify-between items-center pb-3 border-b border-white/10 cursor-pointer" id="bet-slip-header">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">shopping_basket</span>
                <span class="font-bold text-white font-headline-md text-lg tracking-tight uppercase">Boletim de Palpites</span>
                <span class="bg-primary text-background font-black text-xs px-2 py-0.5 rounded-full" id="bet-slip-count">0</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant transition-transform duration-200" id="bet-slip-arrow">keyboard_arrow_up</span>
        </div>
        <div id="bet-slip-content" class="max-h-[220px] overflow-y-auto py-4 space-y-3">
            <p class="text-on-surface-variant text-center py-4 text-sm" id="bet-slip-empty">Nenhum palpite selecionado no momento.</p>
        </div>
        <div class="border-t border-white/10 pt-4 pb-4 space-y-3">
            <div class="flex justify-between items-center text-sm">
                <span class="text-on-surface-variant uppercase font-semibold text-xs tracking-wider">Pontuação Estimada Máxima:</span>
                <span class="font-black text-primary text-xl" id="bet-slip-payout">0 PTS</span>
            </div>
            <button class="w-full bg-primary hover:bg-primary/90 text-background font-extrabold py-3.5 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 text-center uppercase tracking-wider text-sm" id="btn-confirm-bets">
                Confirmar Palpites
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
